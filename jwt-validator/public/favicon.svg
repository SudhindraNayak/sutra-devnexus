<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0c1627"/>

  <!-- Glow halo behind emblem -->
  <circle cx="16" cy="15" r="11" fill="url(#glow)"/>

  <!-- Purple bracket left: { -->
  <path d="M5.5 9.5 C4.5 9.5 4 10 4 11 L4 13.5 C4 14.5 3.2 15 3.2 15 C3.2 15 4 15.5 4 16.5 L4 19 C4 20 4.5 20.5 5.5 20.5"
        fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Purple bracket right: } -->
  <path d="M26.5 9.5 C27.5 9.5 28 10 28 11 L28 13.5 C28 14.5 28.8 15 28.8 15 C28.8 15 28 15.5 28 16.5 L28 19 C28 20 27.5 20.5 26.5 20.5"
        fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gear tick marks at cardinal points (cyan) -->
  <rect x="14.5" y="3"   width="3" height="2.5" rx="0.8" fill="#06b6d4"/>
  <rect x="14.5" y="26.5" width="3" height="2.5" rx="0.8" fill="#06b6d4"/>
  <rect x="3"   y="13.8" width="2.5" height="3" rx="0.8" fill="#06b6d4"/>
  <rect x="26.5" y="13.8" width="2.5" height="3" rx="0.8" fill="#06b6d4"/>

  <!-- Outer circle (glowing) — blurred layer -->
  <circle cx="16" cy="15" r="9" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.25" filter="url(#blur-sm)"/>
  <!-- Outer circle — crisp layer -->
  <circle cx="16" cy="15" r="9" fill="none" stroke="#22d3ee" stroke-width="1.3"/>

  <!-- Inner X cross — blurred glow layer -->
  <line x1="10" y1="9"  x2="22" y2="21" stroke="#22d3ee" stroke-width="3"   stroke-linecap="round" opacity="0.25" filter="url(#blur-sm)"/>
  <line x1="22" y1="9"  x2="10" y2="21" stroke="#22d3ee" stroke-width="3"   stroke-linecap="round" opacity="0.25" filter="url(#blur-sm)"/>
  <!-- Inner X cross — crisp layer -->
  <line x1="10" y1="9"  x2="22" y2="21" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="9"  x2="10" y2="21" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="15" r="2" fill="#0c1627" stroke="#22d3ee" stroke-width="1"/>
</svg>
